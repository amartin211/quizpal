AWSTemplateFormatVersion: '2010-09-09'
Description: QuizPal - multiple choices exam assistant infrastructure

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key
  MathpixAppId:
    Type: String
    NoEcho: true
    Description: Mathpix App ID
  MathpixAppKey:
    Type: String
    NoEcho: true
    Description: Mathpix App Key
  ECRImageUri:
    Type: String
    Description: ECR image URI for the Lambda function

Resources:

  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'QuizPalLambdaRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'lambda.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: 'QuizPalPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                Resource:
                  - !Sub 'arn:aws:s3:::${BucketLambdaFunc}/*'
                  - !Sub 'arn:aws:s3:::${BucketForProcessedImg}/*'
              - Effect: 'Allow'
                Action:
                  - 'dynamodb:PutItem'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:Query'
                Resource:
                  - !GetAtt IntermediaryResultsTable.Arn
                  - !GetAtt WebSocketConnectionsTable.Arn
              - Effect: 'Allow'
                Action:
                  - 'execute-api:ManageConnections'
                Resource: '*'

  ImageProcessorFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: 'quizpal-processor'
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 3008
      Timeout: 240
      PackageType: Image
      Code:
        ImageUri: !Ref ECRImageUri
      Environment:
        Variables:
          BUCKET_LAMBDA: !Ref BucketLambdaFunc
          BUCKET_PROCESSED_IMG: !Ref BucketForProcessedImg
          OPENAI_API_KEY: !Ref OpenAIApiKey
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          APP_ID: !Ref MathpixAppId
          APP_KEY: !Ref MathpixAppKey

  WebSocketHandler:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: 'quizpal-websocket'
      Handler: 'lambda_function.lambda_handler'
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: 'python3.10'
      MemorySize: 128
      Timeout: 3

  LambdaInvokePermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref ImageProcessorFunction
      Principal: 's3.amazonaws.com'
      SourceAccount: !Ref 'AWS::AccountId'
      SourceArn: !GetAtt BucketLambdaFunc.Arn

  IntermediaryResultsTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: 'intermediary_results'
      AttributeDefinitions:
        - AttributeName: 'PK'
          AttributeType: 'S'
        - AttributeName: 'SK'
          AttributeType: 'S'
      KeySchema:
        - AttributeName: 'PK'
          KeyType: 'HASH'
        - AttributeName: 'SK'
          KeyType: 'RANGE'
      BillingMode: PAY_PER_REQUEST

  WebSocketConnectionsTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: 'WebSocketConnections'
      AttributeDefinitions:
        - AttributeName: 'client_id'
          AttributeType: 'S'
        - AttributeName: 'connectionId'
          AttributeType: 'S'
      KeySchema:
        - AttributeName: 'client_id'
          KeyType: 'HASH'
        - AttributeName: 'connectionId'
          KeyType: 'RANGE'
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: 'connectionId-index'
          KeySchema:
            - AttributeName: 'connectionId'
              KeyType: 'HASH'
          Projection:
            ProjectionType: 'ALL'

  BucketForProcessedImg:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub 'quizpal-processed-${AWS::AccountId}'

  BucketLambdaFunc:
    Type: 'AWS::S3::Bucket'
    DependsOn: LambdaInvokePermission
    Properties:
      BucketName: !Sub 'quizpal-uploads-${AWS::AccountId}'
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: 's3:ObjectCreated:*'
            Function: !GetAtt ImageProcessorFunction.Arn

Outputs:
  ImageProcessorArn:
    Value: !GetAtt ImageProcessorFunction.Arn
  WebSocketHandlerArn:
    Value: !GetAtt WebSocketHandler.Arn
  ResultsTableArn:
    Value: !GetAtt IntermediaryResultsTable.Arn
  ConnectionsTableArn:
    Value: !GetAtt WebSocketConnectionsTable.Arn
  UploadBucket:
    Value: !Ref BucketLambdaFunc
  ProcessedBucket:
    Value: !Ref BucketForProcessedImg
